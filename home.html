<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hafsa! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        /* --- FLOATING APP DOCK NAVIGATION --- */
.floating-nav {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50px;
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.nav-item {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 30px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-item:hover, .nav-item.active {
    background: rgba(255, 46, 99, 0.8);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(255, 46, 99, 0.5);
}

/* Mobile Responsive Adjustments */
@media (max-width: 600px) {
    .floating-nav {
        width: 90%;
        justify-content: space-between;
        padding: 10px;
        gap: 5px;
    }
    .nav-item {
        padding: 10px;
        font-size: 0.8rem;
        flex-direction: column;
        gap: 4px;
    }
}

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050205; /* Deep luxury dark background */
            font-family: 'Helvetica Neue', sans-serif;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Subtle hint for interaction */
        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <nav class="floating-nav">
    <a href="home.html" class="nav-item active">🏠 Home</a>
    <a href="heart.html" class="nav-item">❤️ Heart</a>
    <a href="gallery.html" class="nav-item">📸 Gallery</a>
    <a href="game.html" class="nav-item">🎮 Game</a>
        <a href="wishes.html" class="nav-item">✨ Wishes</a>
</nav>

    <div class="instruction">HOVER TO DISRUPT • CLICK TO CELEBRATE</div>
    
    <canvas id="birthdayCanvas"></canvas>

    <script>
        const canvas = document.getElementById('birthdayCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let particles = [];
        let fireworks = [];
        
        const mouse = {
            x: null,
            y: null,
            radius: 100 // Repulsion radius
        };

        // Elegant Birthday Palette: Gold, Rose Gold, White, Pink
        const colors = ['#FFD700', '#FFA07A', '#FF69B4', '#FFFFFF', '#FF1493'];

        function initCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        initCanvasSize();

        window.addEventListener('resize', () => {
            initCanvasSize();
            createTextParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Add Fireworks on Click
        window.addEventListener('mousedown', (e) => createFirework(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) createFirework(e.touches[0].clientX, e.touches[0].clientY);
        });

        // --- PARTICLE CLASS FOR TEXT ---
        class Particle {
            constructor(x, y) {
                // Start particles scattered randomly off-screen
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                // Where they belong to form the letters
                this.baseX = x;
                this.baseY = y;
                
                this.size = Math.random() * 2 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.speedX = 0;
                this.speedY = 0;
                this.friction = 0.85;
                this.ease = Math.random() * 0.05 + 0.02; // Randomize ease for fluid assembly
            }

            update() {
                // Mouse Repulsion Physics
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let forceX = (dx / distance) * force * 15;
                        let forceY = (dy / distance) * force * 15;
                        
                        this.speedX += forceX;
                        this.speedY += forceY;
                    }
                }

                // Spring back to base position
                let homeDx = this.baseX - this.x;
                let homeDy = this.baseY - this.y;
                
                this.speedX += homeDx * this.ease;
                this.speedY += homeDy * this.ease;

                // Friction
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                
                this.x += this.speedX;
                this.y += this.speedY;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        // --- FIREWORK PARTICLE CLASS ---
        class FireworkParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Explosive velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                
                this.gravity = 0.2;
                this.friction = 0.96;
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }

            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function createFirework(x, y) {
            for (let i = 0; i < 80; i++) {
                fireworks.push(new FireworkParticle(x, y));
            }
        }

        // --- CORE LOGIC: SCAN TEXT TO PARTICLES ---
        function createTextParticles() {
            particles = [];
            
            // 1. Draw text on a temporary off-screen canvas setup
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Responsive font sizing based on screen width
            const fontSize = Math.min(canvas.width / 10, 100);
            ctx.fillStyle = 'white';
            ctx.font = `900 ${fontSize}px "Helvetica Neue", Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw lines of text
            ctx.fillText('HAPPY BIRTHDAY', canvas.width / 2, canvas.height / 2 - fontSize / 1.5);
            ctx.fillText('HAFSA', canvas.width / 2, canvas.height / 2 + fontSize / 1.5);

            // 2. Read the pixel data
            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 3. Clear the text so we can replace it with particles
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Set scan density (lower number = more particles, heavier performance)
            // Adjust based on screen size to maintain performance
            const step = canvas.width > 768 ? 4 : 3;

            // 4. Iterate through pixel grid and spawn particles where text is drawn
            for (let y = 0; y < textCoordinates.height; y += step) {
                for (let x = 0; x < textCoordinates.width; x += step) {
                    // Calculate index in the 1D ImageData array
                    const index = (y * textCoordinates.width + x) * 4;
                    // Check alpha channel (index + 3). If > 128, a pixel exists here.
                    const alpha = textCoordinates.data[index + 3];
                    
                    if (alpha > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        // Initialize the text map
        createTextParticles();

        // --- ANIMATION ENGINE ---
        function animate() {
            // Motion blur effect
            ctx.fillStyle = 'rgba(5, 2, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update Text Particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Update Fireworks
            for (let i = 0; i < fireworks.length; i++) {
                fireworks[i].update();
                fireworks[i].draw();
                
                // Remove dead fireworks
                if (fireworks[i].opacity <= 0) {
                    fireworks.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }
        
        // Start engine
        animate();
    </script>
</body>
</html>
