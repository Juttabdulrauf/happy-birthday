<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Vault ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        /* --- FLOATING APP DOCK NAVIGATION --- */
.floating-nav {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50px;
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.nav-item {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 30px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-item:hover, .nav-item.active {
    background: rgba(255, 46, 99, 0.8);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(255, 46, 99, 0.5);
}

/* Mobile Responsive Adjustments */
@media (max-width: 600px) {
    .floating-nav {
        width: 90%;
        justify-content: space-between;
        padding: 10px;
        gap: 5px;
    }
    .nav-item {
        padding: 10px;
        font-size: 0.8rem;
        flex-direction: column;
        gap: 4px;
    }
}

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050205; /* Matches your luxury dark theme */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Crucial for 3D depth */
            touch-action: none;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 46, 99, 0.15) 0%, rgba(5, 2, 5, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .instruction {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* --- THE 3D CAROUSEL --- */
        #drag-container, #spin-container {
            position: relative;
            display: flex;
            margin: auto;
            transform-style: preserve-3d;
            transform: rotateX(-10deg); /* Slight downward tilt for better 3D view */
            z-index: 5;
        }

        #drag-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #drag-container:active {
            cursor: grabbing;
        }

        /* The Image Cards (Polaroid Style) */
        #spin-container img {
            transform-style: preserve-3d;
            position: absolute;
            left: 0;
            top: 0;
            width: 220px;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.2), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.2);
            /* Glassmorphism backing */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            padding: 8px; /* Creates the polaroid border effect */
            transition: box-shadow 0.3s ease;
            -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0,0,0,0.3));
        }

        #spin-container img:hover {
            box-shadow: 0 0 40px rgba(255, 46, 99, 0.6), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            #spin-container img {
                width: 160px;
                height: 220px;
            }
            .instruction { font-size: 0.8rem; top: 30px; }
        }
    </style>
</head>
<body>
    <nav class="floating-nav">
    <a href="home.html" class="nav-item">🏠 Home</a>
    <a href="heart.html" class="nav-item">❤️ Heart</a>
    <a href="gallery.html" class="nav-item active">📸 Gallery</a>
    <a href="game.html" class="nav-item">🎮 Game</a>
    <a href="wishes.html" class="nav-item">✨ Wishes</a>
</nav>

    <div class="ambient-glow"></div>
    <div class="instruction">Some of the Birthday Girl's Pictures</div>

    <div id="drag-container">
        <div id="spin-container">
            <img src="Snapchat-1067224111.jpg" alt="">
            <img src="Snapchat-1439092265.jpg" alt="">
            <img src="Snapchat-310035763.jpg" alt="">
            <img src="Snapchat-368129149.jpg" alt="">
            <img src="Snapchat-768902463.jpg" alt="">
            <img src="Snapchat-901785609.jpg" alt="">
        </div>
    </div>

    <script>
        // --- 3D ENGINE & PHYSICS CONFIG ---
        const radius = window.innerWidth > 768 ? 350 : 220; // How wide the circle is
        const autoRotateSpeed = 0.5; // Base passive spinning speed

        const dragContainer = document.getElementById('drag-container');
        const spinContainer = document.getElementById('spin-container');
        const images = spinContainer.getElementsByTagName('img');
        
        // Arrange images in a perfect 3D circle
        for (let i = 0; i < images.length; i++) {
            // Calculate angle for each image to space them evenly
            const angle = (i * 360) / images.length;
            // Apply 3D transform: rotate around Y axis, then push outward on Z axis
            images[i].style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
        }

        // Center the container
        spinContainer.style.width = images[0].offsetWidth + "px";
        spinContainer.style.height = images[0].offsetHeight + "px";

        // --- INTERACTION PHYSICS ---
        let currentRotateY = 0;
        let currentRotateX = -10;
        let targetRotateY = 0;
        let targetRotateX = -10;
        
        let isDragging = false;
        let startX, startY;
        let lastX, lastY;
        let velocityX = 0;
        let velocityY = 0;

        // Auto-rotation variable
        let autoRotate = autoRotateSpeed;

        // Mouse Events
        document.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', endDrag);

        // Touch Events (Mobile)
        document.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
        document.addEventListener('touchmove', (e) => drag(e.touches[0]));
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            lastX = startX;
            lastY = startY;
            autoRotate = 0; // Stop auto-rotation when user touches it
            
            // Reset transition for direct 1-to-1 movement
            spinContainer.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            
            const currentX = e.clientX;
            const currentY = e.clientY;

            // Calculate distance moved
            const deltaX = currentX - lastX;
            const deltaY = currentY - lastY;

            // Apply movement to target rotation
            targetRotateY += deltaX * 0.4;
            
            // Optional: Allow slight up/down tilt (clamp it so it doesn't flip over)
            targetRotateX -= deltaY * 0.2; 
            if(targetRotateX > 20) targetRotateX = 20;
            if(targetRotateX < -30) targetRotateX = -30;

            // Track velocity for momentum when let go
            velocityX = deltaX;
            velocityY = deltaY;

            lastX = currentX;
            lastY = currentY;
        }

        function endDrag() {
            isDragging = false;
            // Kickstart auto-rotation again in the direction they swiped
            autoRotate = velocityX > 0 ? autoRotateSpeed : -autoRotateSpeed;
        }

        // --- RENDER LOOP ---
        function animate() {
            if (!isDragging) {
                // Apply momentum physics (slowly degrades velocity)
                velocityX *= 0.95; 
                targetRotateY += velocityX * 0.5;
                
                // Return pitch (X axis) slowly to default -10 degrees
                targetRotateX += (-10 - targetRotateX) * 0.05; 

                // Apply passive auto-rotation when momentum dies down
                if(Math.abs(velocityX) < 0.5) {
                    targetRotateY += autoRotate;
                }
            }

            // Smooth interpolation (Lerping) for buttery smooth visuals
            currentRotateY += (targetRotateY - currentRotateY) * 0.1;
            currentRotateX += (targetRotateX - currentRotateX) * 0.1;

            // Apply the final matrix to the DOM element
            spinContainer.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;

            requestAnimationFrame(animate);
        }

        // Start engine
        requestAnimationFrame(animate);

        // Prevent images from ghost-dragging (browser default behavior)
        document.ondragstart = function() { return false; };
    </script>
</body>
</html>
